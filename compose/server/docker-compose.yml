# ridestatus-server docker-compose.yml
services:
  api:
    image: ghcr.io/ridestatus/ridestatus-server:latest
    restart: unless-stopped
    ports:
      - "3100:3100"
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - logs:/app/logs

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-ridestatus}
      POSTGRES_USER:     ${POSTGRES_USER:-ridestatus}
      POSTGRES_PASSWORD: ${POSTGRES_PASS:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ridestatus}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  logs:
