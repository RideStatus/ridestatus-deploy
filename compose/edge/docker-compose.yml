# ridestatus-ride docker-compose.yml
# network_mode: host is required for PLC comms on the ride network NIC
services:
  poller:
    image: ${RIDE_IMAGE:-ghcr.io/ridestatus/ridestatus-ride:latest}
    restart: unless-stopped
    env_file: .env
    ports:
      - "3200:3200"
    volumes:
      - ridedata:/data
      - logs:/app/logs
    network_mode: host

volumes:
  ridedata:
  logs:
