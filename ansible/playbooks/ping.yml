---
# =============================================================================
# Playbook: ping
# Quick connectivity check — verifies Ansible can reach all edge nodes.
#
# Usage:
#   ansible-playbook playbooks/ping.yml
#   ansible-playbook playbooks/ping.yml --limit goliath
# =============================================================================
- name: Connectivity check
  hosts: edge_nodes
  gather_facts: false

  tasks:
    - name: Ping all nodes
      ping:

    - name: Check PM2 status
      become: true
      become_user: "{{ rs_user }}"
      command: pm2 jlist
      register: pm2_jlist
      changed_when: false
      environment:
        HOME: "{{ rs_home }}"

    - name: Report PM2 process states
      vars:
        processes: "{{ pm2_jlist.stdout | from_json }}"
      debug:
        msg: >
          {{ item.name }}: {{ item.pm2_env.status }}
          (pid {{ item.pid | default('—') }})
      loop: "{{ processes }}"
      loop_control:
        label: "{{ item.name }}"
