---
# =============================================================================
# Playbook: deploy
# Full deploy — writes .env from host_vars, pulls latest code, reloads PM2.
# Use this for initial deployment and whenever .env config changes.
#
# Usage:
#   ansible-playbook playbooks/deploy.yml
#   ansible-playbook playbooks/deploy.yml --limit goliath
#
# To deploy without updating code (config change only):
#   ansible-playbook playbooks/deploy.yml -e rs_pull_code=false
#
# To skip .env update (code update only — prefer update.yml instead):
#   ansible-playbook playbooks/deploy.yml -e rs_update_env=false
#
# IMPORTANT — Update order:
# The server should be updated (DB migrations run) BEFORE edge nodes.
# This playbook only targets edge_nodes. Run server updates separately.
# =============================================================================
- name: Deploy ridestatus-ride to edge nodes
  hosts: edge_nodes
  gather_facts: true
  serial: "{{ deploy_serial | default('100%') }}"

  pre_tasks:
    - name: Verify node is reachable
      ping:

    - name: Check server API health before deploying
      uri:
        url: "http://{{ ridestatus_server_host }}:{{ ridestatus_server_port }}/api/v1/rides"
        headers:
          X-Api-Key: "{{ ridestatus_api_key }}"
        status_code: 200
        timeout: 5
      delegate_to: localhost
      run_once: true
      register: api_health
      failed_when: api_health.status != 200

  roles:
    - role: ridestatus_ride
      vars:
        rs_update_env:  "{{ rs_update_env  | default(true) }}"
        rs_pull_code:   "{{ rs_pull_code   | default(true) }}"
        rs_restart_pm2: "{{ rs_restart_pm2 | default(true) }}"

  post_tasks:
    - name: Wait for poller to stabilise
      pause:
        seconds: 5

    - name: Verify poller is running after deploy
      become: true
      become_user: "{{ rs_user }}"
      command: pm2 describe {{ pm2_poller_name }}
      register: pm2_check
      changed_when: false
      failed_when: "'online' not in pm2_check.stdout"
      environment:
        HOME: "{{ rs_home }}"

    - name: Deploy summary
      debug:
        msg: "{{ ride_name }} ({{ inventory_hostname }}) — deploy complete, poller online"
