---
# =============================================================================
# Role: ridestatus_ride
# Deploys/updates the ridestatus-ride application on an edge node.
#
# Steps:
#   1. Validate required host vars are set
#   2. Write /home/ridestatus/.env from host_vars (if rs_update_env)
#   3. Git pull + npm ci (if rs_pull_code)
#   4. Reload PM2 processes (if rs_restart_pm2)
# =============================================================================

- name: Validate required host variables
  assert:
    that:
      - ride_name is defined and ride_name | length > 0
      - plc_ip    is defined and plc_ip    | length > 0
      - ridestatus_server_host is defined and ridestatus_server_host | length > 0
      - ridestatus_api_key     is defined and ridestatus_api_key     | length > 0
    fail_msg: >
      ride_name, plc_ip, ridestatus_server_host, and ridestatus_api_key must
      all be set in host_vars or group_vars for {{ inventory_hostname }}.

# ---------------------------------------------------------------------------
# .env management
# Only written when rs_update_env is true. The template is rendered from
# host_vars + group_vars, preserving SERVER_BOOTSTRAP_TOKEN from the existing
# .env if it is already present on the node.
# ---------------------------------------------------------------------------
- name: Read existing .env (to preserve bootstrap token)
  slurp:
    src: "{{ rs_env }}"
  register: existing_env_raw
  failed_when: false
  when: rs_update_env

- name: Parse existing bootstrap token from .env
  set_fact:
    existing_bootstrap_token: >
      {%- set token = '' -%}
      {%- if existing_env_raw.content is defined -%}
        {%- for line in (existing_env_raw.content | b64decode).splitlines() -%}
          {%- if line.startswith('SERVER_BOOTSTRAP_TOKEN=') -%}
            {%- set token = line.split('=', 1)[1] -%}
          {%- endif -%}
        {%- endfor -%}
      {%- endif -%}
      {{ token | trim }}
  when: rs_update_env

- name: Write .env from host_vars
  become: true
  become_user: "{{ rs_user }}"
  template:
    src:   env.j2
    dest:  "{{ rs_env }}"
    mode:  '0600'
    owner: "{{ rs_user }}"
    group: "{{ rs_user }}"
  when: rs_update_env
  notify:
    - reload pm2 poller
    - reload pm2 nodered

- name: Ensure .env symlink exists in app directory
  become: true
  become_user: "{{ rs_user }}"
  file:
    src:   "{{ rs_env }}"
    dest:  "{{ rs_app_dir }}/.env"
    state: link
    force: true

# ---------------------------------------------------------------------------
# Code update
# ---------------------------------------------------------------------------
- name: Check repo exists on node
  stat:
    path: "{{ rs_app_dir }}/.git"
  register: repo_stat
  when: rs_pull_code

- name: Clone ridestatus-ride (first time)
  become: true
  become_user: "{{ rs_user }}"
  git:
    repo:    "{{ ridestatus_ride_repo }}"
    dest:    "{{ rs_app_dir }}"
    version: "{{ ridestatus_ride_branch }}"
    depth:   1
  when: rs_pull_code and not repo_stat.stat.exists
  notify: reload pm2 poller

- name: Pull latest code (existing repo)
  become: true
  become_user: "{{ rs_user }}"
  git:
    repo:    "{{ ridestatus_ride_repo }}"
    dest:    "{{ rs_app_dir }}"
    version: "{{ ridestatus_ride_branch }}"
    update:  true
    force:   false
  register: git_result
  when: rs_pull_code and repo_stat.stat.exists
  notify: reload pm2 poller

- name: Install npm dependencies
  become: true
  become_user: "{{ rs_user }}"
  npm:
    path:        "{{ rs_app_dir }}"
    ci:          true
    omit_devdeps: true
    state:       present
  when: rs_pull_code and (not repo_stat.stat.exists or git_result.changed)
  notify: reload pm2 poller

# ---------------------------------------------------------------------------
# Ensure PM2 processes are running (idempotent)
# ---------------------------------------------------------------------------
- name: Check PM2 process state
  become: true
  become_user: "{{ rs_user }}"
  command: pm2 describe {{ pm2_poller_name }}
  register: pm2_describe
  failed_when: false
  changed_when: false
  environment:
    HOME: "{{ rs_home }}"

- name: Start PM2 processes if not running
  become: true
  become_user: "{{ rs_user }}"
  command: pm2 start ecosystem.config.js
  args:
    chdir: "{{ rs_app_dir }}"
  environment:
    HOME: "{{ rs_home }}"
  when: pm2_describe.rc != 0
  notify: save pm2
