---
# =============================================================================
# Role: node_red_flows
# Pushes flows.json (and optionally settings.js) to an edge node.
# Restarts rs-nodered only if the file actually changed.
# =============================================================================

- name: Ensure Node-RED directory exists
  become: true
  become_user: "{{ rs_user }}"
  file:
    path:  "{{ node_red_flows_dir }}"
    state: directory
    mode:  '0755'
    owner: "{{ rs_user }}"
    group: "{{ rs_user }}"

- name: Verify flows source file exists on controller
  delegate_to: localhost
  stat:
    path: "{{ flows_src }}"
  register: flows_src_stat

- name: Fail if flows source file not found
  fail:
    msg: "flows.json not found at {{ flows_src }} — set flows_src variable or create the file."
  when: not flows_src_stat.stat.exists

- name: Push flows.json to node
  become: true
  become_user: "{{ rs_user }}"
  copy:
    src:    "{{ flows_src }}"
    dest:   "{{ node_red_flows_file }}"
    owner:  "{{ rs_user }}"
    group:  "{{ rs_user }}"
    mode:   '0644'
    backup: true
  register: flows_copy
  notify: restart rs-nodered

- name: Push settings.js to node
  become: true
  become_user: "{{ rs_user }}"
  copy:
    src:    "{{ settings_src }}"
    dest:   "{{ node_red_settings_file }}"
    owner:  "{{ rs_user }}"
    group:  "{{ rs_user }}"
    mode:   '0644'
    backup: true
  when: push_settings
  register: settings_copy
  notify: restart rs-nodered

- name: Report no changes
  debug:
    msg: "flows.json already up to date on {{ inventory_hostname }} — no restart needed"
  when: not flows_copy.changed
