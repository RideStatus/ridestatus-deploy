---
# =============================================================================
# RideStatus — Global Variables (all hosts)
# =============================================================================

# ----------------------------------------------------------------------------
# RideStatus Server — used by roles to push files and check API health
# Override per-host in host_vars if a node talks to a different server.
# ----------------------------------------------------------------------------
ridestatus_server_host: "{{ lookup('env', 'RIDESTATUS_SERVER_HOST') | default('10.15.140.101', true) }}"
ridestatus_server_port: "{{ lookup('env', 'RIDESTATUS_SERVER_PORT') | default('3100', true) }}"
ridestatus_api_key:     "{{ lookup('env', 'RIDESTATUS_API_KEY')     | default('changeme', true) }}"

# ----------------------------------------------------------------------------
# OS user and paths — must match edge-init.sh
# ----------------------------------------------------------------------------
rs_user:    ridestatus
rs_home:    /home/ridestatus
rs_app_dir: /home/ridestatus/ridestatus-ride
rs_env:     /home/ridestatus/.env
rs_data:    /home/ridestatus/data
rs_log:     /var/log/ridestatus

# ----------------------------------------------------------------------------
# GitHub repository — nodes never pull directly; Ansible mirrors locally
# and pushes via this role. Overridable if you self-host a mirror.
# ----------------------------------------------------------------------------
ridestatus_ride_repo:   "https://github.com/RideStatus/ridestatus-ride.git"
ridestatus_ride_branch: main

# ----------------------------------------------------------------------------
# Node-RED
# ----------------------------------------------------------------------------
node_red_port:         1880
node_red_flows_dir:    /home/ridestatus/.node-red
node_red_flows_file:   /home/ridestatus/.node-red/flows.json
node_red_settings_file: /home/ridestatus/.node-red/settings.js

# ----------------------------------------------------------------------------
# PM2 process names — must match ecosystem.config.js in ridestatus-ride
# ----------------------------------------------------------------------------
pm2_poller_name:   rs-poller
pm2_nodered_name:  rs-nodered
