---
# =============================================================================
# RideStatus — Edge Node Group Defaults
# Override any of these in host_vars/<hostname>.yml for per-node config.
# =============================================================================

# ----------------------------------------------------------------------------
# PLC defaults — override per node
# ----------------------------------------------------------------------------
plc_protocol:  enip
plc_ip:        ""
plc_slot:      0
netdde_host:   ""
netdde_share:  ""

# ----------------------------------------------------------------------------
# PLC tag name defaults — match edge-init.sh and .env.example
# ----------------------------------------------------------------------------
tag_mode:          ProgramMode
tag_fault:         FaultCode
tag_fault_message: FaultMessage
tag_fault_ts:      FaultTimestamp
tag_cycle_count:   TotalCycles
tag_cycle_time:    LastCycleTime
tag_status_message: StatusMessage
tag_rtc:           SystemTime

# ----------------------------------------------------------------------------
# Network interface names — override per node if non-standard
# Default matches legacy Pi layout: eth0=ride, eth1=dept
# ----------------------------------------------------------------------------
ride_nic_interface:        eth0
ridestatus_nic_interface:  eth1

# ----------------------------------------------------------------------------
# Timing defaults
# ----------------------------------------------------------------------------
poll_interval_ms:  1000
push_interval_s:   3
offline_timeout_s: 300
push_max_queue:    20

# ----------------------------------------------------------------------------
# Deployment control flags
# Set to false to skip individual steps in the deploy role.
# ----------------------------------------------------------------------------
rs_update_env:    true   # write/update .env from host_vars
rs_pull_code:     true   # git pull + npm ci
rs_restart_pm2:   true   # pm2 reload after code update
rs_push_flows:    false  # push Node-RED flows (use push_flows.yml playbook)
