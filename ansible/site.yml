---
# =============================================================================
# RideStatus — Master Playbook (site.yml)
#
# Runs a full deploy across all edge nodes.
# Equivalent to: ansible-playbook playbooks/deploy.yml
#
# For targeted or partial runs, call the individual playbooks directly.
#
# Usage:
#   ansible-playbook site.yml
#   ansible-playbook site.yml --limit goliath
#   ansible-playbook site.yml --check          # dry run
#   ansible-playbook site.yml --diff           # show config diffs
# =============================================================================
- import_playbook: playbooks/deploy.yml
