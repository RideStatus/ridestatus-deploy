---
# =============================================================================
# RideStatus — Static Inventory
# =============================================================================
# This file is the fallback/source-of-truth inventory.
# For dynamic inventory from the server API, use inventory/dynamic.py instead.
#
# Usage:
#   ansible-playbook -i inventory/hosts.yml playbooks/deploy.yml
#   ansible-playbook -i inventory/dynamic.py playbooks/deploy.yml
#
# Node vars that MUST be set per host:
#   ride_name              — matches RIDE_NAME in .env and server DB
#   ansible_host           — dept/RideStatus NIC IP (Ansible SSH target)
#
# Optional per-host overrides (see host_vars/<hostname>.yml):
#   plc_ip, plc_protocol, plc_slot, tag_*, server_host, etc.
# =============================================================================

all:
  vars:
    # Ansible SSH user is always ridestatus (set in ansible.cfg)
    ansible_user: ridestatus

  children:

    edge_nodes:
      hosts:
        # -----------------------------------------------------------------------
        # Add one entry per edge node.
        # ansible_host = dept/RideStatus NIC IP  (the NIC Ansible can reach)
        # ride_name    = must match RIDE_NAME in .env and server DB
        # -----------------------------------------------------------------------
        # goliath:
        #   ansible_host: 10.15.140.17
        #   ride_name: Goliath
        #
        # batman:
        #   ansible_host: 10.15.140.20
        #   ride_name: Batman
        #
        # giant_drop:
        #   ansible_host: 10.15.140.22
        #   ride_name: Giant Drop

    # Server and Ansible VM — for housekeeping plays (not ride deployment)
    ridestatus_servers:
      hosts:
        # ridestatus_server:
        #   ansible_host: 10.15.140.101
