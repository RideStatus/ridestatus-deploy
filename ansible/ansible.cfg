# =============================================================================
# RideStatus — Ansible Configuration
# =============================================================================
[defaults]
inventory           = inventory/hosts.yml
remote_user         = ridestatus
private_key_file    = ~/.ssh/ansible_ridestatus
host_key_checking   = false
retry_files_enabled = false
stdout_callback     = yaml
callback_whitelist  = profile_tasks

# Keep output readable on slow Pi hardware
forks               = 5
pipelining          = true

[ssh_connection]
ssh_args            = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=15
control_path_dir    = /tmp/ansible-cp
